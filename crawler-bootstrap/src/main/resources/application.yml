server:
  httpPort: 80
  port: 443
  tomcat:
    threads:
      min-spare: 5
  ssl:
    key-store-type: PKCS12
    key-store: classpath:cert/f-li.cn.pfx
    enabled: true
    client-auth: none
    ciphers: TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_256_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256,TLS_RSA_WITH_AES_128_CBC_SHA256,TLS_RSA_WITH_AES_256_CBC_SHA256
  max-http-header-size: 16KB
spring:
  application:
    name: svc-mercury
apollo:
  bootstrap:
    enabled: true
    namespaces: application,middleware
app:
  id: svc-mercury
  net:
    connectTimeoutMillis: 40000
    ntp:
      enableFlags: 3
  browser:
    listenPort: 1210
    maintenancePeriod: 10000
    maxActiveMinutes: 4
    dumpPeriod: 6000
    asyncThreshold: 0.8
    takeTimeoutSeconds: 6
    remotingPortRange: 1220-1320
    poolSize: 1
    windowAutoBlank: true

    #    diskDataPath: /app-crawler/data/chrome%s/
    windowRectangle: "600,500,800,600"
    cookieContainerType: org.rx.crawler.service.impl.MemoryCookieContainer
    fingerprintEnabled: false
    fingerprintScriptPath: /bot/chrome-fingerprint.js
    fingerprintStealthScriptPath: /static/js/stealth.min.js
    fingerprintCheckUrl: https://bot.sannysoft.com/
    fingerprintHeadless: false
    fingerprintDiagnostics: false
    playwrightChannel: chrome
    playwrightExecutablePath:
    locale: zh-CN
    timezoneId: Asia/Shanghai
    blockResourceEnabled: false
    humanInputEnabled: true
    humanActionMinDelayMillis: 180
    humanActionMaxDelayMillis: 650
    mouseMoveMinSteps: 24
    mouseMoveMaxSteps: 56
    typingMinDelayMillis: 90
    typingMaxDelayMillis: 260
  custom:
    remotingEnabled: true
    remotingListenPort: 1211
    chrome:
      profileBasePath: D:/app-crawler/data/chrome
      defaultProfileName: common
    jdUnion:
      profileName: common
      fingerprintEnabled: true
      headless: false
      preflightEnabled: true
      preflightUrl: https://bot.sannysoft.com/
      preflightStrict: true
      preflightCacheMinutes: 30
      forcePreflight: true
      overviewUrl: https://union.jd.com/overview
      loginCheckUrl: https://union.jd.com/overview
      workbenchUrl: https://union.jd.com/proManager/index?pageNo=1
      loginUrlPrefix: https://union.jd.com/index?returnUrl=
      defaultMediaType: 导购媒体推广
      defaultMediaName: 微信
      pageTimeoutSeconds: 60
      initialPageTimeoutSeconds: 60
      stepDelayMillis: 1200
      keepBrowserOpenOnLoginRequired: true
      keepBrowserOpenSecondsOnLoginRequired: 180
      loginWaitSeconds: 180
      defaultOutputPath: D:/app-crawler/data/jd-union/output.jsonl
