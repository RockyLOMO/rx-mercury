<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta http-equiv="Cache-Control" content="no-cache"/>
    <title th:text="${title}"></title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #f6f8fb;
            color: #1f2937;
            font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        table {
            width: min(980px, 100%);
            margin: 0 auto;
            border-collapse: collapse;
            background: #fff;
            border: 1px solid #d8dee9;
        }
        td {
            padding: 12px 14px;
            border-bottom: 1px solid #edf1f7;
            vertical-align: top;
        }
        tr:last-child td {
            border-bottom: 0;
        }
        .title {
            background: #eaf1ff;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0;
        }
        .label {
            width: 180px;
            background: #f8fafc;
            color: #475569;
            font-weight: 600;
            white-space: nowrap;
        }
        .value {
            word-break: break-all;
        }
        textarea {
            width: 100%;
            min-height: 240px;
            box-sizing: border-box;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #fafafa;
            color: #111827;
            font: 12px/1.6 Consolas, "Courier New", monospace;
            resize: vertical;
        }
    </style>
</head>
<body>
<table align="center">
    <tr>
        <td colspan="2" class="title" th:text="'Hello, ' + ${name} + '!'"></td>
    </tr>
    <tr>
        <td class="label">Url</td>
        <td class="value" th:text="${regionUrl}"></td>
    </tr>
    <tr>
        <td class="label">Action</td>
        <td class="value" th:text="${action}"></td>
    </tr>
    <tr>
        <td class="label">ServletRequestCookie</td>
        <td class="value">
            <textarea readonly="readonly" th:text="${requestCookie}" style="width: 420px; height: 300px;"></textarea>
        </td>
    </tr>
    <tr>
        <td class="label">HttpClientJarCookie</td>
        <td class="value">
            <textarea readonly="readonly" th:text="${rawCookie}" style="width: 420px; height: 300px;"></textarea>
        </td>
    </tr>
</table>
</body>
</html>
